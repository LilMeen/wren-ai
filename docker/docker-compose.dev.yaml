version: "3"

volumes:
  data:

networks:
  wren:
    driver: bridge

services:
  bootstrap:
    image: ghcr.io/canner/wren-bootstrap:${WREN_BOOTSTRAP_VERSION}
    pull_policy: always
    platform: ${PLATFORM}
    environment:
      DATA_PATH: /app/data
    volumes:
      - data:/app/data
    command: /bin/sh /app/init.sh

  wren-engine:
    image: ghcr.io/canner/wren-engine:${WREN_ENGINE_VERSION}
    pull_policy: always
    platform: ${PLATFORM}
    expose:
      - ${WREN_ENGINE_SQL_PORT}
    ports:
      - ${WREN_ENGINE_PORT}:${WREN_ENGINE_PORT}
    volumes:
      - data:/usr/src/app/etc
    networks:
      - wren
    depends_on:
      - bootstrap

  wren-ai-service:
    image: wren-ai-service:local
    build:
      context: ../wren-ai-service
      dockerfile: docker/Dockerfile
    platform: ${PLATFORM}
    ports:
      - ${AI_SERVICE_FORWARD_PORT}:${WREN_AI_SERVICE_PORT}
    environment:
      WREN_UI_ENDPOINT: http://wren-ui:3000
      # sometimes the console won't show print messages,
      # using PYTHONUNBUFFERED: 1 can fix this
      PYTHONUNBUFFERED: 1
      CONFIG_PATH: /app/config.yaml
    env_file:
      - ${PROJECT_DIR}/.env
    volumes:
      - ${PROJECT_DIR}/config.yaml:/app/config.yaml:ro
      - ${PROJECT_DIR}/data:/app/data:ro
    networks:
      - wren
    restart: on-failure
    depends_on:
      qdrant:
        condition: service_healthy

  ibis-server:
    image: wren-engine-ibis:local
    build:
      context: ../wren-engine/ibis-server
      dockerfile: Dockerfile
      additional_contexts:
        wren-core-py: ../wren-engine/wren-core-py
        wren-core: ../wren-engine/wren-core
        wren-core-base: ../wren-engine/wren-core-base
        mcp-server: ../wren-engine/mcp-server
    platform: ${PLATFORM}
    expose:
      - 8000
    ports:
      - ${IBIS_SERVER_PORT}:8000
    environment:
      WREN_ENGINE_ENDPOINT: http://wren-engine:${WREN_ENGINE_PORT}
      LOG_LEVEL: DEBUG
    networks:
      - wren

  wren-ui:
    image: wren-ui:local
    build:
      context: ../wren-ui
      dockerfile: Dockerfile
    platform: ${PLATFORM}
    ports:
      - ${HOST_PORT}:3000
    environment:
      DB_TYPE: ${DB_TYPE}
      PG_URL: ${PG_URL}
      PG_SSL_REJECT_UNAUTHORIZED: ${PG_SSL_REJECT_UNAUTHORIZED:-true}
      WREN_ENGINE_ENDPOINT: http://wren-engine:${WREN_ENGINE_PORT}
      WREN_AI_ENDPOINT: http://wren-ai-service:${WREN_AI_SERVICE_PORT}
      IBIS_SERVER_ENDPOINT: http://ibis-server:${IBIS_SERVER_PORT}
      # shared secret accepted from trusted backend services (wren-ai-service)
      WREN_INTERNAL_API_SECRET: ${WREN_INTERNAL_API_SECRET}
      GENERATION_MODEL: ${GENERATION_MODEL}
      WREN_ENGINE_PORT: ${WREN_ENGINE_PORT}
      WREN_AI_SERVICE_VERSION: ${WREN_AI_SERVICE_VERSION}
      WREN_UI_VERSION: local
      WREN_ENGINE_VERSION: ${WREN_ENGINE_VERSION}
      USER_UUID: ${USER_UUID}
      POSTHOG_API_KEY: ${POSTHOG_API_KEY}
      POSTHOG_HOST: ${POSTHOG_HOST}
      TELEMETRY_ENABLED: ${TELEMETRY_ENABLED}
      NEXT_PUBLIC_USER_UUID: ${USER_UUID}
      NEXT_PUBLIC_POSTHOG_API_KEY: ${POSTHOG_API_KEY}
      NEXT_PUBLIC_POSTHOG_HOST: ${POSTHOG_HOST}
      NEXT_PUBLIC_TELEMETRY_ENABLED: ${TELEMETRY_ENABLED}
      EXPERIMENTAL_ENGINE_RUST_VERSION: ${EXPERIMENTAL_ENGINE_RUST_VERSION}
      WREN_PRODUCT_VERSION: ${WREN_PRODUCT_VERSION}
    volumes:
      - data:/app/data
    networks:
      - wren
    depends_on:
      - wren-ai-service
      - wren-engine
      - ibis-server

  qdrant:
    image: qdrant/qdrant:v1.15.0
    pull_policy: always
    restart: on-failure
    ports:
      - 6333:6333
      - 6334:6334
    volumes:
      - data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "timeout 2 bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    networks:
      - wren

  # If you want to use postgres for testing purpose, uncomment the following block
  # postgres:
  #   image: postgres:14-alpine
  #   platform: ${PLATFORM}
  #   ports:
  #     - 9432:5432
  #   volumes:
  #     - data:/var/lib/postgresql/data
  #   environment:
  #     - POSTGRES_PASSWORD=secret
  #     - POSTGRES_USER=test
  #     - POSTGRES_DB=test
  #     - PGDATA=/var/lib/postgresql/data/pgdata
  #   networks:
  #     - wren
