version: "3"

volumes:
  data:

networks:
  wren:
    driver: bridge
    # Fixed subnet + static IPs: glibc getaddrinfo can hang forever on this
    # host (WSL2/Docker Desktop netlink kernel bug leaves a D-state thread in
    # the node workers), so all service-to-service endpoints are configured
    # by IP instead of container name to avoid DNS entirely.
    ipam:
      config:
        - subnet: 172.29.10.0/24

services:
  bootstrap:
    image: ghcr.io/canner/wren-bootstrap:${WREN_BOOTSTRAP_VERSION}
    restart: on-failure
    platform: ${PLATFORM}
    environment:
      DATA_PATH: /app/data
    volumes:
      - data:/app/data
    command: /bin/sh /app/init.sh

  wren-engine:
    image: ghcr.io/canner/wren-engine:0.22.0
    restart: on-failure
    platform: ${PLATFORM}
    expose:
      - ${WREN_ENGINE_PORT}
      - ${WREN_ENGINE_SQL_PORT}
    volumes:
      - data:/usr/src/app/etc
      - ${PROJECT_DIR}/data:/usr/src/app/data
    networks:
      wren:
        ipv4_address: 172.29.10.2
    depends_on:
      - bootstrap

  ibis-server:
    image: lilmeen1012/wren-engine-ibis:sit
    restart: on-failure
    platform: ${PLATFORM}
    expose:
      - ${IBIS_SERVER_PORT}
    environment:
      WREN_ENGINE_ENDPOINT: http://172.29.10.2:${WREN_ENGINE_PORT}
      # more workers so a burst of parallel dry-runs from the AI service
      # cannot starve all of them into gunicorn WORKER TIMEOUT → SIGKILL
      WREN_NUM_WORKERS: ${IBIS_NUM_WORKERS:-4}
    volumes:
      - ${LOCAL_STORAGE:-.}:/usr/src/app/data
    networks:
      wren:
        ipv4_address: 172.29.10.3

  wren-ai-service:
    image: lilmeen1012/wren-ai-service:sit
    restart: on-failure
    platform: ${PLATFORM}
    expose:
      - ${WREN_AI_SERVICE_PORT}
    ports:
      - ${AI_SERVICE_FORWARD_PORT}:${WREN_AI_SERVICE_PORT}
    environment:
      # sometimes the console won't show print messages,
      # using PYTHONUNBUFFERED: 1 can fix this
      PYTHONUNBUFFERED: 1
      CONFIG_PATH: /app/config.yaml
      # by-IP endpoints (see networks comment) — these override the env_file
      WREN_UI_ENDPOINT: http://172.29.10.6:3000
      QDRANT_HOST: 172.29.10.5
      # shared secret so dry-run/deploy calls to wren-ui pass authentication
      WREN_INTERNAL_API_SECRET: ${WREN_INTERNAL_API_SECRET}
    env_file:
      - ${PROJECT_DIR}/.env
    volumes:
      - ${PROJECT_DIR}/config.yaml:/app/config.yaml:ro
      - ${PROJECT_DIR}/data:/app/data:ro
    networks:
      wren:
        ipv4_address: 172.29.10.4
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:v1.15.0
    restart: on-failure
    expose:
      - 6333
      - 6334
    volumes:
      - data:/qdrant/storage
    networks:
      wren:
        ipv4_address: 172.29.10.5

  wren-ui:
    image: lilmeen1012/wren-ui:sit
    restart: on-failure
    platform: ${PLATFORM}
    environment:
      DB_TYPE: sqlite
      # /app is the working directory in the container
      SQLITE_FILE: /app/data/db.sqlite3
      # by-IP endpoints (see networks comment)
      WREN_ENGINE_ENDPOINT: http://172.29.10.2:${WREN_ENGINE_PORT}
      WREN_AI_ENDPOINT: http://172.29.10.4:${WREN_AI_SERVICE_PORT}
      IBIS_SERVER_ENDPOINT: http://172.29.10.3:${IBIS_SERVER_PORT}
      # shared secret accepted from trusted backend services (wren-ai-service)
      WREN_INTERNAL_API_SECRET: ${WREN_INTERNAL_API_SECRET}
      # this is for telemetry to know the model, i think ai-service might be able to provide a endpoint to get the information
      GENERATION_MODEL: ${GENERATION_MODEL}
      # telemetry
      WREN_ENGINE_PORT: ${WREN_ENGINE_PORT}
      WREN_AI_SERVICE_VERSION: ${WREN_AI_SERVICE_VERSION}
      WREN_UI_VERSION: ${WREN_UI_VERSION}
      WREN_ENGINE_VERSION: ${WREN_ENGINE_VERSION}
      USER_UUID: ${USER_UUID}
      POSTHOG_API_KEY: ${POSTHOG_API_KEY}
      POSTHOG_HOST: ${POSTHOG_HOST}
      TELEMETRY_ENABLED: ${TELEMETRY_ENABLED}
      # client side
      NEXT_PUBLIC_USER_UUID: ${USER_UUID}
      NEXT_PUBLIC_POSTHOG_API_KEY: ${POSTHOG_API_KEY}
      NEXT_PUBLIC_POSTHOG_HOST: ${POSTHOG_HOST}
      NEXT_PUBLIC_TELEMETRY_ENABLED: ${TELEMETRY_ENABLED}
      EXPERIMENTAL_ENGINE_RUST_VERSION: ${EXPERIMENTAL_ENGINE_RUST_VERSION}
      # configs
      WREN_PRODUCT_VERSION: ${WREN_PRODUCT_VERSION}
    ports:
      # HOST_PORT is the port you want to expose to the host machine
      - ${HOST_PORT}:3000
    volumes:
      - data:/app/data
    networks:
      wren:
        ipv4_address: 172.29.10.6
    depends_on:
      - wren-ai-service
      - wren-engine
