name: Build IMAGE FOR SIT

on:
  push:
    branches:
      - dev
      - feature/custom_image
  workflow_dispatch:

env:
  WREN_ENGINE_VERSION: 0.24.7-SNAPSHOT
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_DEV_USERNAME }}

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: wren-ui
            image: wren-ui
            context: ./wren-ui
            dockerfile: ./wren-ui/Dockerfile
            build_args: ""

          - name: wren-ai-service
            image: wren-ai-service
            context: ./wren-ai-service
            dockerfile: ./wren-ai-service/docker/Dockerfile
            build_args: ""

          - name: wren-engine
            image: wren-engine
            context: ./wren-engine/wren-core-legacy/docker
            dockerfile: ./wren-engine/wren-core-legacy/docker/Dockerfile
            build_args: |
               WREN_VERSION=0.24.7-SNAPSHOT

          - name: wren-engine-ibis
            image: wren-engine-ibis
            context: ./wren-engine/ibis-server
            dockerfile: ./wren-engine/ibis-server/Dockerfile
            build_args: ""

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check Dockerfile exists
        run: |
          echo "Checking Dockerfile: ${{ matrix.service.dockerfile }}"
          test -f "${{ matrix.service.dockerfile }}"

      - name: Set up Java for wren-engine
        if: matrix.service.name == 'wren-engine'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build wren-engine jar
        if: matrix.service.name == 'wren-engine'
        working-directory: ./wren-engine/wren-core-legacy
        run: |
          set -e
      
          chmod +x ./mvnw
          ./mvnw clean package -DskipTests
      
          JAR_PATH=$(find ./wren-server/target \
            -name "wren-server-*.jar" \
            ! -name "*sources.jar" \
            ! -name "*tests.jar" \
            ! -name "*test-sources.jar" \
            | head -n 1)
      
          if [ -z "$JAR_PATH" ]; then
            echo "Cannot find wren-server jar"
            find . -name "*.jar"
            exit 1
          fi
      
          echo "Found jar: $JAR_PATH"
      
          cp "$JAR_PATH" ./docker/wren-server-${{ env.WREN_ENGINE_VERSION }}-executable.jar
      
          ls -lah ./docker

      - name: Check wren-engine docker context
        if: matrix.service.name == 'wren-engine'
        run: |
          test -f ./wren-engine/wren-core-legacy/docker/entrypoint.sh
          test -f ./wren-engine/wren-core-legacy/docker/wren-server-${{ env.WREN_ENGINE_VERSION }}-executable.jar

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_DEV_USERNAME }}
          password: ${{ secrets.DOCKERHUB_DEV_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push normal services
        if: matrix.service.name != 'wren-engine-ibis'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          build-args: ${{ matrix.service.build_args }}
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.service.image }}:latest
            ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.service.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

      - name: Build and push ibis-server
        if: matrix.service.name == 'wren-engine-ibis'
        uses: docker/build-push-action@v6
        with:
          context: ./wren-engine/ibis-server
          file: ./wren-engine/ibis-server/Dockerfile
          push: true
          build-contexts: |
            wren-core-py=./wren-engine/wren-core-py
            wren-core=./wren-engine/wren-core
            wren-core-base=./wren-engine/wren-core-base
            mcp-server=./wren-engine/mcp-server
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/wren-engine-ibis:latest
            ${{ env.DOCKERHUB_USERNAME }}/wren-engine-ibis:${{ github.sha }}
          cache-from: type=gha,scope=wren-engine-ibis
          cache-to: type=gha,mode=max,scope=wren-engine-ibis

